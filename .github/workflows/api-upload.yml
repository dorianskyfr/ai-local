name: API Upload to v1.6.0

on:
  push:
    branches:
      - main
    paths:
      - '.api-trigger'

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifacts
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build.yml
        run_id: 28805672281
        path: artifacts
        
    - name: Upload via GitHub API
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find all binary files
          const files = [];
          function findFiles(dir) {
            const items = fs.readdirSync(dir);
            for (const item of items) {
              const fullPath = path.join(dir, item);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                findFiles(fullPath);
              } else if (item.match(/\.(exe|AppImage|deb)$/i)) {
                files.push(fullPath);
              }
            }
          }
          findFiles('artifacts');
          
          console.log('Found files:', files);
          
          // Upload each file to release 349656182
          for (const filePath of files) {
            const fileName = path.basename(filePath);
            const fileData = fs.readFileSync(filePath);
            
            console.log(`Uploading ${fileName} (${fileData.length} bytes)...`);
            
            try {
              const response = await github.rest.repos.uploadReleaseAsset({
                owner: 'dorianskyfr',
                repo: 'ai-local',
                release_id: 349656182,
                name: fileName,
                data: fileData,
                headers: {
                  'content-type': 'application/octet-stream'
                }
              });
              
              console.log(`✅ Uploaded ${fileName}:`, response.data.url);
            } catch (error) {
              console.error(`❌ Failed to upload ${fileName}:`, error.message);
            }
          }
