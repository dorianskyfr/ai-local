name: Build Windows .exe

on:
  push:
    branches:
      - main
      - claude/chat-ai-app-v01-05tmud
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows executables
        run: npm run dist:win

      - name: Read app version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AI-Local-windows
          path: |
            dist/*.exe
          if-no-files-found: error

      # Le patch note de la release est lu dans docs/releases/v<version>.md ;
      # s'il n'existe pas, les notes sont générées automatiquement.
      - name: Check patch note file
        id: notes
        shell: bash
        run: |
          f="docs/releases/v${{ steps.pkg.outputs.version }}.md"
          if [ -f "$f" ]; then echo "path=$f" >> "$GITHUB_OUTPUT"; fi

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.pkg.outputs.version) }}
          name: AI Local ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.pkg.outputs.version) }}
          files: dist/*.exe
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: ${{ steps.notes.outputs.path == '' }}

  # À chaque release, le README principal (branche main) et les notes de
  # version sont synchronisés depuis le code publié.
  sync-readme:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          path: release-source

      - name: Sync README and release notes to main
        run: |
          cp release-source/README.md README.md
          mkdir -p docs/releases
          cp -r release-source/docs/releases/. docs/releases/ 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/releases
          if git diff --cached --quiet; then
            echo "README déjà à jour."
          else
            git commit -m "Docs : synchroniser le README et les notes de version depuis la release"
            git push origin main
          fi
