name: Create v1.6.0 Release with Assets

on:
  push:
    branches:
      - main

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifacts from build run
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build.yml
        run_id: 28805672281
        path: assets
        
    - name: List files
      run: find assets -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \)
      
    - name: Create release with assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.6.0
        name: "AI Local v1.6.0"
        body: "## 🚀 AI Local v1.6.0 — RÉVOLUTION : Un seul modèle partagé par TOUS les utilisateurs !

**NOUVEAU CONCEPT MONDIAL** : Plus de modèles isolés, plus de fragmentation. Désormais, **tous les utilisateurs partagent et améliorent le même modèle global**. Chaque conversation, chaque correction, chaque apprentissage profite à toute la communauté.

### 💥 CHANGEMENT MAJEUR : Système de Modèle Collaboratif Unique
- Un seul modèle pour tous (global-model-v1.6.json)
- Synchronisation automatique au démarrage et toutes les 5 minutes
- Contributions transparentes et anonymes
- 100% offline après synchronisation

### 🔧 Améliorations Techniques
- Markov Order 3 (vs Order 2 précédemment)
- Mémoire hiérarchique (15 000 entrées)
- Système de synonymes (12+ groupes)
- Fonctions mathématiques étendues

### ⚡ Suppressions
- Qwen/LLM externe supprimé
- Plus de dépendances externes

### 📦 Fichiers
| Fichier | Description |
|---|---|
| `AI-Local-1.6.0-portable.exe` | Windows portable |
| `AI Local Setup 1.6.0.exe` | Windows installateur |
| `AI-Local-1.6.0.AppImage` | Linux AppImage |
| `ai-local_1.6.0_amd64.deb` | Linux deb package |

> Si tu as une version précédente installée, elle te proposera cette mise à jour automatiquement."
        files: |
          assets/**/*.exe
          assets/**/*.AppImage
          assets/**/*.deb
        generate_release_notes: false
        make_latest: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
