name: Manual Build v1.6.0 (All Platforms)

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Install builder deps
      run: sudo apt-get update && sudo apt-get install -y rpm fuse

    - name: Build Linux
      run: npm run dist:linux

    - name: List files
      run: ls -la dist/ || true

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-artifacts
        path: dist/

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Build Windows
      run: npm run dist:win

    - name: List files
      run: dir dist/ || true

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: dist/

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List all artifacts
      run: find artifacts/ -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \)

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.6.0
        name: AI Local v1.6.0 — Modèle Global Unique
        body_path: RELEASE-v1.6.0.md
        files: |
          artifacts/*.exe
          artifacts/*.deb
          artifacts/*.AppImage
        fail_on_unmatched_files: false
        overwrite: true
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
