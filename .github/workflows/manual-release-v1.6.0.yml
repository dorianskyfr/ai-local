name: Manual Release v1.6.0

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install electron-builder dependencies
      run: sudo apt-get update && sudo apt-get install -y rpm fuse

    - name: Build Linux AppImage and DEB
      run: npm run dist:linux
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List built files
      run: ls -la dist/

    - name: Delete existing v1.6.0 release
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const release = await github.rest.repos.getReleaseByTag({
              owner: 'dorianskyfr',
              repo: 'ai-local',
              tag: 'v1.6.0'
            });
            console.log('Deleting existing release:', release.data.id);
            await github.rest.repos.deleteRelease({
              owner: 'dorianskyfr',
              repo: 'ai-local',
              release_id: release.data.id
            });
            console.log('✅ Deleted existing release');
          } catch (error) {
            console.log('No existing release to delete:', error.message);
          }

    - name: Create v1.6.0 release with assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.6.0
        name: AI Local v1.6.0
        body_file: RELEASE-v1.6.0.md
        draft: false
        prerelease: false
        files: |
          dist/*.AppImage
          dist/*.deb
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
