name: Release v1.6.0 with Assets

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install electron-builder dependencies
      run: sudo apt-get update && sudo apt-get install -y rpm fuse wine64

    - name: Build all binaries
      run: |
        npm run dist:win || true
        npm run dist:linux || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List built files
      run: ls -la dist/ || true

    - name: Delete existing release and recreate with assets
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find all binary files
          const files = [];
          function findFiles(dir) {
            try {
              const items = fs.readdirSync(dir);
              for (const item of items) {
                const fullPath = path.join(dir, item);
                const stat = fs.statSync(fullPath);
                if (stat.isDirectory()) {
                  findFiles(fullPath);
                } else if (item.match(/\.(exe|AppImage|deb)$/i)) {
                  files.push(fullPath);
                }
              }
            } catch (e) {
              console.log('Error reading directory:', dir, e.message);
            }
          }
          findFiles('dist');
          
          console.log('Found files:', files);
          
          // Delete existing release for tag v1.6.0
          try {
            const release = await github.rest.repos.getReleaseByTag({
              owner: 'dorianskyfr',
              repo: 'ai-local',
              tag: 'v1.6.0'
            });
            
            console.log('Deleting existing release:', release.data.id);
            await github.rest.repos.deleteRelease({
              owner: 'dorianskyfr',
              repo: 'ai-local',
              release_id: release.data.id
            });
            console.log('✅ Deleted existing release');
          } catch (error) {
            console.log('No existing release to delete:', error.message);
          }
          
          // Create new release with assets
          let body = '';
          try {
            body = fs.readFileSync('RELEASE-v1.6.0.md', 'utf8');
          } catch (e) {
            console.log('No RELEASE-v1.6.0.md found, using default body');
            body = 'AI Local v1.6.0 - Collaborative Model System';
          }
          
          const newRelease = await github.rest.repos.createRelease({
            owner: 'dorianskyfr',
            repo: 'ai-local',
            tag_name: 'v1.6.0',
            name: 'AI Local v1.6.0',
            body: body,
            draft: false,
            prerelease: false
          });
          
          console.log('✅ Created new release:', newRelease.data.id);
          
          // Upload each file
          for (const filePath of files) {
            const fileName = path.basename(filePath);
            let fileData;
            try {
              fileData = fs.readFileSync(filePath);
            } catch (e) {
              console.error(`❌ Failed to read ${filePath}:`, e.message);
              continue;
            }
            
            console.log(`Uploading ${fileName} (${fileData.length} bytes)...`);
            
            try {
              const response = await github.rest.repos.uploadReleaseAsset({
                owner: 'dorianskyfr',
                repo: 'ai-local',
                release_id: newRelease.data.id,
                name: fileName,
                data: fileData,
                headers: {
                  'content-type': 'application/octet-stream'
                }
              });
              
              console.log(`✅ Uploaded ${fileName}:`, response.data.url);
            } catch (error) {
              console.error(`❌ Failed to upload ${fileName}:`, error.message);
              console.error('Error details:', error);
            }
          }
