name: Release v1.6.0 with Assets

on:
  push:
    tags:
      - 'v1.6.1'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install electron-builder dependencies
      run: sudo apt-get update && sudo apt-get install -y rpm fuse

    - name: Build Linux AppImage
      run: npm run dist:linux
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List built files
      run: ls -la dist/

    - name: Release with assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.6.1
        name: AI Local v1.6.1
        body_file: RELEASE-v1.6.0.md
        draft: false
        prerelease: false
        files: |
          dist/*.AppImage
          dist/*.deb
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
