name: Trigger Manual Upload

on:
  push:
    branches:
      - main
    paths:
      - '.trigger-upload'

jobs:
  trigger:
    runs-on: ubuntu-latest
    
    steps:
    - name: Trigger manual-upload workflow
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: 'dorianskyfr',
            repo: 'ai-local',
            workflow_id: 'manual-upload.yml',
            ref: 'main'
          });
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
