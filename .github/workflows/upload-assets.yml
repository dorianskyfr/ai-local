name: Upload Assets to Release

on:
  workflow_dispatch:

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts from previous run
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build.yml
        run_id: 28805672281
        path: artifacts

    - name: List downloaded files
      run: find artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \)

    - name: Upload to v1.6.0 release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.6.0
        files: |
          artifacts/**/*.exe
          artifacts/**/*.AppImage
          artifacts/**/*.deb
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
