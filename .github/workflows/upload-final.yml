name: Upload Assets Final

on:
  push:
    tags:
      - 'v1.6.0'

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifacts from run 28805672281
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build.yml
        run_id: 28805672281
        path: artifacts
        
    - name: List files
      run: find artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \)
      
    - name: Upload via GitHub API script
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find all binary files
          const files = [];
          function findFiles(dir) {
            const items = fs.readdirSync(dir);
            for (const item of items) {
              const fullPath = path.join(dir, item);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                findFiles(fullPath);
              } else if (item.match(/\.(exe|AppImage|deb)$/i)) {
                files.push(fullPath);
              }
            }
          }
          findFiles('artifacts');
          
          console.log('Found files:', files);
          
          // Get release for tag v1.6.0
          const release = await github.rest.repos.getReleaseByTag({
            owner: 'dorianskyfr',
            repo: 'ai-local',
            tag: 'v1.6.0'
          });
          
          console.log('Release ID:', release.data.id);
          console.log('Upload URL:', release.data.upload_url);
          
          // Upload each file
          for (const filePath of files) {
            const fileName = path.basename(filePath);
            const fileData = fs.readFileSync(filePath);
            
            console.log(`Uploading ${fileName} (${fileData.length} bytes)...`);
            
            try {
              const response = await github.rest.repos.uploadReleaseAsset({
                owner: 'dorianskyfr',
                repo: 'ai-local',
                release_id: release.data.id,
                name: fileName,
                data: fileData,
                headers: {
                  'content-type': 'application/octet-stream'
                }
              });
              
              console.log(`✅ Uploaded ${fileName}:`, response.data.url);
            } catch (error) {
              console.error(`❌ Failed to upload ${fileName}:`, error.message);
              console.error('Error details:', error);
            }
          }
