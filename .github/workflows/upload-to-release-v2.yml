name: Upload Assets to v1.6.0 Release v2

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifacts from build run
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build.yml
        run_id: 28805672281
        path: downloaded-artifacts
        
    - name: List downloaded files
      run: find downloaded-artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \)
      
    - name: Upload all assets to v1.6.0 release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.6.0
        files: |
          downloaded-artifacts/**/*.exe
          downloaded-artifacts/**/*.AppImage
          downloaded-artifacts/**/*.deb
        generate_release_notes: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
