name: Upload Assets to v1.6.0 Release

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifacts from build run
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build.yml
        run_id: 28805672281
        path: downloaded-artifacts
        
    - name: List downloaded files
      run: find downloaded-artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) -exec ls -la {} \;
      
    - name: Upload each file to release
      run: |
        # Get release ID
        RELEASE_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/dorianskyfr/ai-local/releases/tags/v1.6.0" | jq -r '.id')
        
        echo "Release ID: $RELEASE_ID"
        
        # Upload each file
        for file in downloaded-artifacts/**/*.exe downloaded-artifacts/**/*.AppImage downloaded-artifacts/**/*.deb; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            echo "Uploading $filename..."
            curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file" \
              "https://uploads.github.com/repos/dorianskyfr/ai-local/releases/$RELEASE_ID/assets?name=$filename"
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
