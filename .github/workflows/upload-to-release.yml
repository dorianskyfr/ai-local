name: Upload Assets to v1.6.0 Release

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifacts from build run
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build.yml
        run_id: 28805672281
        path: downloaded-artifacts
        
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq
        
    - name: List downloaded files
      run: find downloaded-artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \)
      
    - name: Get release ID
      id: get-release
      run: |
        RELEASE_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/dorianskyfr/ai-local/releases/tags/v1.6.0" | jq -r '.id')
        echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_OUTPUT
        echo "Release ID: $RELEASE_ID"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Windows portable
      run: |
        FILE=$(find downloaded-artifacts -name "*portable*.exe" | head -1)
        if [ -n "$FILE" ]; then
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$FILE" \
            "https://uploads.github.com/repos/dorianskyfr/ai-local/releases/${{ steps.get-release.outputs.RELEASE_ID }}/assets?name=$(basename $FILE)"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Windows nsis
      run: |
        FILE=$(find downloaded-artifacts -name "*Setup*.exe" | head -1)
        if [ -n "$FILE" ]; then
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$FILE" \
            "https://uploads.github.com/repos/dorianskyfr/ai-local/releases/${{ steps.get-release.outputs.RELEASE_ID }}/assets?name=$(basename $FILE)"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Linux AppImage
      run: |
        FILE=$(find downloaded-artifacts -name "*.AppImage" | head -1)
        if [ -n "$FILE" ]; then
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$FILE" \
            "https://uploads.github.com/repos/dorianskyfr/ai-local/releases/${{ steps.get-release.outputs.RELEASE_ID }}/assets?name=$(basename $FILE)"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Linux deb
      run: |
        FILE=$(find downloaded-artifacts -name "*.deb" | head -1)
        if [ -n "$FILE" ]; then
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$FILE" \
            "https://uploads.github.com/repos/dorianskyfr/ai-local/releases/${{ steps.get-release.outputs.RELEASE_ID }}/assets?name=$(basename $FILE)"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
